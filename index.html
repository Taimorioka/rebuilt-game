<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FRC 2026 - Local Multiplayer</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="shift-flash"></div>

<div class="hud" id="main-hud">
    <div class="stat" style="color: #ef4444;">RED: <span id="scoreRedDisplay">0</span></div>
    <div class="stat" style="color: #ef4444;">FUEL: <span id="heldRed">0</span></div>
    <div class="shift-divider" style="color: #666;">|</div>
    <div class="stat" style="color: #3b82f6;">BLUE: <span id="scoreBlueDisplay">0</span></div>
    <div class="stat" style="color: #3b82f6;">FUEL: <span id="heldBlue">0</span></div>
</div>

<div id="timer-panel">
    <div id="match-clock" class="stopped">2:20</div>
    <div id="phase-label">MATCH NOT STARTED</div>
    <div id="phase-timer"></div>
</div>

<div id="auto-winner">AUTO WON BY RED</div>

<div class="controls-wrapper">
    <button id="toggle-controls-btn">☰ HIDE CONTROLS</button>
    <div class="controls" id="control-panel">

        <button id="start-btn">▶ START MATCH</button>
        <button id="team-mode-toggle" class="purple-team">TEAM: SEPARATE</button>

        <button id="bot-red-toggle" class="red-team">PLAYER 1: 2910</button>
        <button id="p1-input-toggle" class="red-team">P1: KEYBOARD</button>
        <button id="p1-start-toggle" class="red-team">P1 START: HUB</button>
        <button id="p1-unstick" class="red-team btn-unstick disabled">P1 UNSTICK (1)</button>

        <div style="height: 5px;"></div>

        <button id="p2-toggle" class="purple-team">PLAYER 2: ON</button>
        <button id="bot-blue-toggle" class="blue-team">PLAYER 2: 2910</button>
        <button id="p2-input-toggle" class="blue-team">P2: KEYBOARD2</button>
        <button id="p2-start-toggle" class="blue-team">P2 START: HUB</button>
        <button id="p2-unstick" class="blue-team btn-unstick disabled">P2 UNSTICK (1)</button>

        <button id="reset-btn">RESET FIELD</button>
        <button id="bad-apple">Bad Apple</button>
    </div>
</div>

<canvas id="field"></canvas>

<video id="videoPlayer" src="bad_apple.mp4" crossorigin="anonymous" style="display: none;"></video>

<script type="module" src="script.js"></script>
</body>
</html>
